name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/deslop_check.py
      - run: python scripts/check_value_bar.py
      - run: python scripts/check_prompt_recipe_surfaces.py
      - run: python -m claude_agent_harness_opt matrix-coverage-suite evals/model_matrix evals/targets/gstack/gstack_skill_selection_matrix.json --strict --out /tmp/model-matrix-coverage-suite.json
      - run: python scripts/check_finding_packets.py
      - run: python scripts/check_eval_surfaces.py
      - run: python -m compileall claude_agent_harness_opt scripts
      - run: python -m unittest discover -s tests -q
      - run: python -m claude_agent_harness_opt render recipes/agentic_search.json
      - run: python -m claude_agent_harness_opt eval evals/examples/search_answer.json
      - run: python -m claude_agent_harness_opt review-trace evals/examples/agent_trace_good.json
      - run: python -m claude_agent_harness_opt normalize-claude evals/examples/claude_messages.json
      - run: python -m claude_agent_harness_opt normalize-runtime evals/examples/cursor_trace_review_events.json
      - run: python -m claude_agent_harness_opt import-run evals/examples/import_run_cursor_export.json --adapter cursor --out-dir /tmp/imported-run
      - run: python -m claude_agent_harness_opt audit-agent /tmp/imported-run/agent_audit_bundle.json
      - run: python -m claude_agent_harness_opt snapshot-surface --matrix evals/model_matrix/harness_trace_adapters.json --bundle evals/examples/agent_audit_bundle.json --skill .claude/skills/agent-audit/SKILL.md --out /tmp/surface-snapshot.json
      - run: python -m claude_agent_harness_opt mcp-e2e evals/e2e/github_readonly.json --dry-run --out /tmp/github-e2e.json
      - run: python -m claude_agent_harness_opt trace-suite evals/suites/agent_trace_suite.json
      - run: python -m claude_agent_harness_opt audit-agent evals/examples/agent_audit_bundle.json
      - run: python -m claude_agent_harness_opt optimize-tools evals/examples/agent_audit_bundle.json
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/coding_tool_selection.json --providers anthropic --harnesses native_tools --variants tuned_boundaries --instruction-variants boundary_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/harness_trace_adapters.json --providers trace_fixture --harnesses agent_sdk_trace --variants exported_trace_tools --instruction-variants exported_trace --max-cases 1 --out /tmp/harness-matrix.json
      - run: python -m claude_agent_harness_opt render-report /tmp/harness-matrix.json --out /tmp/harness-matrix.html
      - run: python -m claude_agent_harness_opt pr-comment /tmp/harness-matrix.json --out /tmp/harness-matrix.md
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/agent_audit_skill_selection.json --providers anthropic --harnesses prompt_json --variants thin_workflow_tools --instruction-variants agent_audit_skill --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/github_mcp_tool_selection.json --providers anthropic --harnesses prompt_json --variants stock_github_mcp --instruction-variants github_mcp_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/playwright_mcp_tool_selection.json --providers anthropic --harnesses prompt_json --variants stock_playwright_mcp --instruction-variants playwright_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/slack_mcp_tool_selection.json --providers anthropic --harnesses prompt_json --variants stock_slack_mcp --instruction-variants slack_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/filesystem_mcp_tool_selection.json --providers anthropic --harnesses prompt_json --variants stock_filesystem_mcp --instruction-variants filesystem_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/postgres_mcp_pro_tool_selection.json --providers anthropic --harnesses prompt_json --variants stock_postgres_mcp_pro --instruction-variants postgres_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/firecrawl_mcp_tool_selection.json --providers anthropic --harnesses prompt_json --variants tuned_firecrawl_mcp_boundaries --instruction-variants firecrawl_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/context7_mcp_tool_selection.json --providers anthropic --harnesses prompt_json --variants readme_context7_mcp --instruction-variants context7_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/supabase_mcp_database_tool_selection.json --providers anthropic --harnesses prompt_json --variants tuned_supabase_database_boundaries --instruction-variants supabase_database_host_rules --max-cases 2
      - run: python -m claude_agent_harness_opt model-matrix evals/model_matrix/harness_trace_adapters.json --live --require-live --providers trace_fixture --harnesses agent_sdk_trace,cursor_trace --variants exported_trace_tools --instruction-variants exported_trace
      - run: python -m claude_agent_harness_opt grind-harness evals/model_matrix/coding_tool_selection.json --providers anthropic --harnesses native_tools --instruction-variants boundary_rules --cases "investigate trace review flow,map model matrix implementation" --heldout-cases "find python files,read known file" --min-improvement 0.05 --max-live-calls 20
      - name: Run live Claude semantic judge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY"
          python -m claude_agent_harness_opt audit-agent evals/examples/agent_audit_bundle.json --claude-judge
          python -m claude_agent_harness_opt optimize-tools evals/examples/agent_audit_bundle.json --claude-judge
          python -m claude_agent_harness_opt model-matrix evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --variants tuned_boundaries --instruction-variants boundary_rules --max-cases 2
          python -m claude_agent_harness_opt grind-harness evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --instruction-variants boundary_rules --cases "investigate trace review flow,map model matrix implementation" --heldout-cases "find python files,read known file" --min-improvement 0.05 --max-live-calls 20
      - run: if python -m claude_agent_harness_opt audit-agent evals/examples/agent_audit_missing_value_bar.json; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_opt audit-agent evals/examples/agent_audit_bundle.json --claude-judge; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_opt optimize-tools evals/examples/agent_audit_bundle.json --claude-judge; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_opt model-matrix evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --variants tuned_boundaries --instruction-variants boundary_rules --max-cases 1; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_opt grind-harness evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --instruction-variants boundary_rules --cases "investigate trace review flow" --heldout-cases "read known file" --max-live-calls 4; then exit 1; fi
